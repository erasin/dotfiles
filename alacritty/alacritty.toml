[general]
import = [
  "themes/oneDark.toml",
  "keymaps/tmux_keymap.toml",
  "font.toml"
]

[debug]
log_level = "Warn"

[selection]
save_to_clipboard = true

[env]
TERM = "xterm-256color"
# TERM = "wezterm"

[mouse]
hide_when_typing = true
bindings = [{ mouse = "Right", mods = "Control", action = "Paste" }]

# [shell]
# args = ["-l", "-c", "tmux attach || tmux"]
# program = "/bin/bash"

[window]
# decorations = "none"
dynamic_padding = true
dynamic_title = true
dimensions = { columns = 162, lines = 42 }
padding = { x = 2, y = 0 }
# opacity = 0.90

[scrolling]
history = 10000
multiplier = 3

[bell]
animation = "Linear"
duration = 0

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "M", mods = "Control|Shift", action = "ToggleViMode" },
  { key = "-", mods = "Control", action = "DecreaseFontSize" },
  { key = "=", mods = "Control", action = "IncreaseFontSize" },
  { key = "0", mods = "Control|Shift", action = "ResetFontSize" },
]

