# ============================================
# TMUX 配置
# link this file as ~/.tmux.conf
# reload: tmux source ~/.tmux.conf
# install plugins: <prefix> I
# https://tmuxcheatsheet.com/
# ============================================

# ---- 前缀键 ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 重新加载配置 (统一使用当前文件路径)
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

# ---- 终端设置 ----
# 256 色 + 真彩色支持
set -ga terminal-overrides ',xterm-256color:Tc'

# undercurl 支持
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Yazi 图片预览支持
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# 响应速度
set -s escape-time 50
set -sg repeat-time 300
set -s focus-events on
set -g extended-keys on    # pi.dev 使用
set -g extended-keys-format csi-u

# 历史记录和鼠标
set -g history-limit 5000
set -g mouse on
set -g set-clipboard on

# ---- 索引 ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---- 窗口自动命名 ----
setw -g automatic-rename on
set -g allow-rename on

# ---- 状态栏 ----
set -g status off             # 默认关闭
set -g status-position bottom
set -g status-interval 10
set -g display-panes-time 800
set -g display-time 1000
set -g monitor-activity on
set -g visual-activity off

# 切换状态栏显示
bind -r e set-option status

# ---- 会话操作 ----
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# ---- 窗口操作 ----
bind c new-window -c "#{pane_current_path}"
bind . command-prompt -I "#I" { swap-window -t "%%" }
bind -r C-j swap-window -t -1 \; select-window -t -1
bind -r C-k swap-window -t +1 \; select-window -t +1
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# ---- 面板操作 ----
# 分割 (保留当前目录)
unbind %
bind - split-window -h -c "#{pane_current_path}"
unbind '"'
bind _ split-window -v -c "#{pane_current_path}"

# 面板导航 (前缀 + hjkl)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# 面板导航 (无前缀 Alt + 方向键)
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# 面板大小调整
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
bind -r f resize-pane -Z  # 最大化面板

# 多面板同步输入
bind s set-window-option synchronize-panes on \; display "synchronize on"
bind S set-window-option synchronize-panes off \; display "synchronize off"

# ---- Scratch 临时会话 (弹出窗口) ----
bind v if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    if-shell "tmux has-session -t scratch" {
        display-popup -w 80% -h 75% -E "tmux attach-session -t scratch"
    } {
        display-popup -w 80% -h 75% -E "tmux new-session -d -c '#{pane_current_path}' -s scratch && tmux set-option -t scratch status off && tmux attach-session -t scratch"
    }
}

# ---- Vi 模式 ----
set -g mode-keys vi
set -g status-keys vi

# ---- 复制模式 ----
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

unbind -T copy-mode-vi MouseDragEnd1Pane

# ---- 插件 (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# 主题
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/default/cyan'

# resurrect 设置
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# 初始化 TPM (必须放在最后)
run '~/.config/tmux/plugins/tpm/tpm'
