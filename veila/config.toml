# https://naurissteins.com/veila/docs/configuration


# default, seceda, normandy, diagonal
# theme = "skyline"

[background]
mode = "file"
path = "/home/erasin/Pictures/wallpaper/red-haired-serenity-anime-art-in-4k-backiee-4K.jpg"
blur_radius = 12
dim_strength = 34
# tint = "rgba(25, 100, 100, 0.2)"
# tint_opacity = 1


[lock]
acquire_timeout_seconds = 5
auto_reload_config = true
auto_reload_debounce_ms = 250
log_to_file = false
log_file_path = "/home/erasin/.local/state/veila/veilad.log"
auth_backoff_base_ms = 750
auth_backoff_max_seconds = 12
show_username = true
user_hint = "Password"
avatar_path = "/home/erasin/Pictures/cat.png"

[weather]
enabled = true
location = "HangZhou"
refresh_minutes = 15
unit = "celsius"

# [battery]
# enabled = true
# refresh_seconds = 30

[now_playing]
include_players = ["mpd-mpris"]
exclude_players = ["Firefox", "Chromium"]

